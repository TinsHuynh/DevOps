# SonarQube Project Configuration for QuanLySinhVien Backend
# Unique project key (domain:project format is a best practice)
sonar.projectKey=QuanLySinhVien:Backend
sonar.projectName=QuanLySinhVien Backend API
sonar.projectVersion=1.0.0

# Description and organization
sonar.projectDescription=MERN Stack Backend - Student Management System
sonar.organization=quanlysinhvien

# Source code directories
sonar.sources=src

# Test directories  
sonar.tests=tests

# Exclude node_modules and other non-source files from analysis
sonar.exclusions=node_modules/**,build/**,dist/**,coverage/**

# JavaScript/Node.js specific settings
sonar.javascript.file.suffixes=.js,.jsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Code coverage reports (if you generate them)
sonar.coverage.exclusions=**/node_modules/**,**/tests/**,**/*.test.js

# Language
sonar.language=js

# Log level
sonar.log.level=INFO

# SCM (Source Control Management) 
sonar.scm.provider=git
sonar.scm.forceDetection=true
